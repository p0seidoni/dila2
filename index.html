<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემო პატარა პრინცესა</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffb6c1, #ffc0cb, #ffe4e1);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #d81b60;
        }
        #page1, #page2 {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: opacity 1s ease-in-out;
        }
        #page2 {
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 2px 2px 5px rgba(255, 255, 255, 0.8);
            z-index: 2;
            margin: 20px;
            padding: 0 15px;
        }
        .btn {
            padding: 15px 50px;
            font-size: 1.4rem;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            transition: transform 0.3s, background-color 0.3s;
            z-index: 2;
            margin-top: 40px;
            font-weight: bold;
        }
        .btn:hover {
            transform: scale(1.1);
            background-color: #e91e63;
        }
        .heart {
            position: absolute;
            color: #ff4081;
            animation: float 5s linear infinite;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(110vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        .message-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 35px;
            border-radius: 25px;
            max-width: 85%;
            width: 650px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            line-height: 1.8;
            font-size: 1.3rem;
            margin: 20px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #typed-text {
            white-space: pre-wrap;
        }
        /* კურსორის ანიმაცია */
        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #d81b60;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="page1">
        <h1>მიყვარხარ ჩემო პატარა პრინცესა ❤️</h1>
        <button class="btn" onclick="startSurprise()">დააჭირე აქ</button>
    </div>

    <div id="page2">
        <div class="message-box">
            <div id="typed-text"></div>
        </div>
    </div>

    <script>
        const fullText = "ჩემო პატარა პრინცესა, ჩემო გულო, ჩემო სულო, ჩემო ბედნიერებავ ვერ აგიღწერ რა ძლიერ მიყვარხარ. \n\nსიტყვებით ვერ გადმოვცემ როგორი ბედნიერი ვარ შენს გვერდით. მინდა ჩემი ცხოვრების ყოველ წამს შენს გვერდით ვატარებდე, მინდა ყოველი დილა ყოველი ღამე ყოველი დღე ყოველი წუთი წამი თუ საათი შენ მოგიძღვნა. \n\nმინდა ჩემს გვერდით ყველაზე ბედნიერი ქალი იყო. ყველაფერი გამოგვივა ცხოვრება ყველაფერი უზომოთ მიყვარხარ და სულ მალე ჩვენი ბუდე გვექნება ჩვენი ოჯახი და ჩვენი პატარა დრაკონები მიყვარხარ ❤️";

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const heartsArray = ['❤️', '💖', '💗', '💓', '💕'];
            heart.innerText = heartsArray[Math.floor(Math.random() * heartsArray.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);

        function typeWriter(text, i) {
            if (i < text.length) {
                // ტექსტის აკრეფა
                document.getElementById("typed-text").innerText = text.substring(0, i + 1);
                // კურსორის დამატება ბოლოში
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                cursor.innerHTML = '&nbsp;';
                document.getElementById("typed-text").appendChild(cursor);

                setTimeout(function() {
                    typeWriter(text, i + 1)
                }, 100); // სიჩქარე ახლა არის 100მს (უფრო ნელი)
            } else {
                // ბოლოს კურსორი რომ დარჩეს ან გაქრეს
                const finalCursor = document.querySelector('.cursor');
                if(finalCursor) finalCursor.remove();
            }
        }

        function startSurprise() {
            document.getElementById('page1').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('page1').style.display = 'none';
                const page2 = document.getElementById('page2');
                page2.style.opacity = '1';
                page2.style.pointerEvents = 'auto';
                
                fireworks();
                
                setTimeout(() => {
                    typeWriter(fullText, 0);
                }, 800);
            }, 1000);
        }

        function fireworks() {
            var end = Date.now() + (7 * 1000); 
            var colors = ['#ff4081', '#ffffff', '#ff1493'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
